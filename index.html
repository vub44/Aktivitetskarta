<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Garmin</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #121212; color: white; display: flex; height: 100vh; overflow: hidden; }
        #sidebar { width: 350px; background: #1e1e1e; padding: 20px; overflow-y: auto; box-shadow: 2px 0 10px rgba(0,0,0,0.5); z-index: 10; }
        #map { flex-grow: 1; z-index: 1; }
        
        h2 { color: #fc4c02; margin-top: 0; }
        .control-group { margin-bottom: 20px; background: #2a2a2a; padding: 15px; border-radius: 8px; }
        label { display: block; margin-bottom: 8px; font-size: 14px; color: #ccc; }
        input[type="range"] { width: 100%; accent-color: #fc4c02; }
        
        #preview-container { margin-top: 20px; border: 2px dashed #444; border-radius: 8px; position: relative; background-image: linear-gradient(45deg, #252525 25%, transparent 25%), linear-gradient(-45deg, #252525 25%, transparent 25%), linear-gradient(45deg, transparent 75%, #252525 75%), linear-gradient(-45deg, transparent 75%, #252525 75%); background-size: 20px 20px; background-position: 0 0, 0 10px, 10px -10px, -10px 0px; }
        #previewCanvas { width: 100%; display: block; border-radius: 6px; }
        
        .btn { background: #fc4c02; color: white; border: none; padding: 12px; border-radius: 6px; cursor: pointer; width: 100%; font-weight: bold; font-size: 16px; margin-top: 10px; }
        .btn:hover { background: #ff6a2d; }
        .stats-display { font-family: monospace; font-size: 12px; color: #2ecc71; margin-top: 10px; }
    </style>
</head>
<body>

<div id="sidebar">
    <h2>Inställningar</h2>
    
    <div class="control-group">
        <label>Välj GPX-fil</label>
        <input type="file" id="fileInput" accept=".gpx" />
    </div>
    <div class="control-group">
        <label>Kartstil</label>
        <select id="lineStyle" style="width: 100%; padding: 8px; background: #333; color: white; border: 1px solid #555; border-radius: 4px;">
            <option value="solid">Standard (Orange)</option>
            <option value="speed">Fartkarta (Blå=Långsam, Röd=Snabb)</option>
            <option value="elevation">Höjdkarta (Grön=Låg, Röd=Hög)</option>
        </select>
    </div>
    
    <div class="control-group">
        <label>Visa på bilden:</label>
        <label style="display:flex; gap:10px;"><input type="checkbox" id="showDist" checked> Distans</label>
        <label style="display:flex; gap:10px;"><input type="checkbox" id="showTime" checked> Tid</label>
        <label style="display:flex; gap:10px;"><input type="checkbox" id="showPace" checked> Tempo</label>
        <label style="display:flex; gap:10px;"><input type="checkbox" id="showHR"> Snittpuls</label>
        <label style="display:flex; gap:10px;"><input type="checkbox" id="showEle"> Höjdmeter</label>
    </div>

    <div class="control-group">
        <label>Rörelsetröskel (m/s): <span id="threshVal">0.3</span></label>
        <input type="range" id="threshold" min="0.1" max="1.5" step="0.1" value="0.3">
        <p style="font-size: 10px; color: #888;">Högre värde = hårdare filtrering av stillastående tid.</p>
    </div>

    <div class="control-group">
        <label>Bild-padding: <span id="padVal">15</span>%</label>
        <input type="range" id="padding" min="5" max="30" step="5" value="15">
    </div>

    <div id="statsBox" class="stats-display"></div>

    <div id="preview-container">
        <canvas id="previewCanvas"></canvas>
    </div>

    <button id="downloadBtn" class="btn" style="display:none;">Ladda ner Transparent PNG</button>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    const map = L.map('map').setView([59, 18], 5);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

    let rawPoints = [];
    let pathSegments = []; // NY: Sparar data för varje litet segment av rutten
    let statsMinMax = { minEle: 0, maxEle: 0, minSpeed: 0, maxSpeed: 0 };
    let processedStats = {};
    
    const previewCanvas = document.getElementById('previewCanvas');
    const ctx = previewCanvas.getContext('2d');

    // UI-element
    const fileInput = document.getElementById('fileInput');
    const threshSlider = document.getElementById('threshold');
    const padSlider = document.getElementById('padding');
    const styleSelect = document.getElementById('lineStyle'); // NY: Rullgardinsmenyn
    const downloadBtn = document.getElementById('downloadBtn');
    
    const checkboxes = ['showDist', 'showTime', 'showPace', 'showHR', 'showEle'];

    // Lyssna på ändringar
    fileInput.addEventListener('change', handleFile);
    threshSlider.addEventListener('input', () => { document.getElementById('threshVal').innerText = threshSlider.value; updateAll(); });
    padSlider.addEventListener('input', () => { document.getElementById('padVal').innerText = padSlider.value; updateAll(); });
    styleSelect.addEventListener('change', updateAll); // Rita om när man byter stil
    
    checkboxes.forEach(id => {
        document.getElementById(id).addEventListener('change', drawPreview); // Behöver bara rita om bilden för texten
    });

    async function handleFile(e) {
        const file = e.target.files[0];
        if (!file) return;
        const text = await file.text();
        parseGPX(text);
        updateAll();
        downloadBtn.style.display = 'block';
    }

    function parseGPX(xmlText) {
        const parser = new DOMParser();
        const xmlDoc = parser.parseFromString(xmlText, "text/xml");
        const trkpts = xmlDoc.getElementsByTagName("trkpt");
        rawPoints = [];
    
        for (let pt of trkpts) {
            let hr = null, cad = null;
            const extensions = pt.getElementsByTagName("extensions")[0];
            if (extensions) {
                const nodes = extensions.getElementsByTagName("*");
                for (let node of nodes) {
                    if (node.nodeName.includes("hr")) hr = node.textContent;
                    if (node.nodeName.includes("cad")) cad = node.textContent;
                }
            }
            if (!hr) hr = pt.getElementsByTagName("hr")[0]?.textContent;
            
            rawPoints.push({
                lat: parseFloat(pt.getAttribute("lat")),
                lon: parseFloat(pt.getAttribute("lon")),
                ele: parseFloat(pt.getElementsByTagName("ele")[0]?.textContent || 0),
                time: new Date(pt.getElementsByTagName("time")[0]?.textContent),
                hr: hr ? parseInt(hr) : null
            });
        }
    }

    function formatPace(timeSeconds, distMeters) {
        if (distMeters <= 0) return "--:-- /km";
        const distKm = distMeters / 1000;
        const paceMinKm = (timeSeconds / 60) / distKm;
        const mins = Math.floor(paceMinKm);
        const secs = Math.round((paceMinKm - mins) * 60);
        return `${mins}:${secs.toString().padStart(2, '0')} /km`;
    }

    function updateAll() {
        if (rawPoints.length < 2) return;
        calculateMovingStats();
        drawPreview();
        updateMap();
    }

    function calculateMovingStats() {
        let dist = 0, time = 0, eleGain = 0, hrSum = 0, hrCount = 0;
        const threshold = parseFloat(threshSlider.value);
        
        pathSegments = [];
        let speeds = [];
        let elevations = [];
    
        for (let i = 0; i < rawPoints.length - 1; i++) {
            const p1 = rawPoints[i], p2 = rawPoints[i+1];
            
            if (p2.ele > p1.ele) eleGain += (p2.ele - p1.ele);
            if (p1.hr) { hrSum += p1.hr; hrCount++; }
            if (p1.ele !== undefined) elevations.push(p1.ele);
    
            const d = map.distance([p1.lat, p1.lon], [p2.lat, p2.lon]);
            const t = (p2.time - p1.time) / 1000;
            let speed = 0;

            if (t > 0 && (d/t) > threshold) {
                dist += d;
                time += t;
                speed = d/t; // Meter per sekund
                speeds.push(speed);
            }
            
            // Spara data för just denna lilla linje
            pathSegments.push({ p1, p2, speed, ele: p1.ele || 0 });
        }
        
        // --- Beräkna smart min/max för färgskalan ---
        // Vi sorterar arrayerna och tar bort de extrema ytterligheterna (GPS-buggar)
        if (speeds.length > 0) {
            speeds.sort((a, b) => a - b);
            statsMinMax.minSpeed = speeds[Math.floor(speeds.length * 0.05)]; // Ignorera 5% långsammaste
            statsMinMax.maxSpeed = speeds[Math.floor(speeds.length * 0.95)]; // Ignorera 5% snabbaste (rusningar/buggar)
        }
        if (elevations.length > 0) {
            elevations.sort((a, b) => a - b);
            statsMinMax.minEle = elevations[Math.floor(elevations.length * 0.02)];
            statsMinMax.maxEle = elevations[Math.floor(elevations.length * 0.98)];
        }
    
        processedStats = {
            distStr: (dist / 1000).toFixed(2) + " km",
            timeStr: new Date(time * 1000).toISOString().substr(11, 8),
            paceStr: formatPace(time, dist),
            hrStr: hrCount > 0 ? Math.round(hrSum / hrCount) + " bpm" : "--",
            eleStr: Math.round(eleGain) + " m"
        };
        document.getElementById('statsBox').innerText = `Beräknat: ${processedStats.distStr} | ${processedStats.timeStr}`;
    }

    // NY FUNKTION: Hämtar rätt färg för varje segment beroende på menyn
    function getSegmentColor(segment) {
        const style = styleSelect.value;
        if (style === 'solid') return '#fc4c02'; // Klassisk Orange

        if (style === 'speed') {
            if (statsMinMax.maxSpeed === statsMinMax.minSpeed) return 'hsl(120, 100%, 50%)';
            let norm = (segment.speed - statsMinMax.minSpeed) / (statsMinMax.maxSpeed - statsMinMax.minSpeed);
            norm = Math.max(0, Math.min(1, norm)); // Håll värdet mellan 0 och 1
            
            // HSL: 240 (Blå) -> 120 (Grön) -> 0 (Röd)
            const hue = (1 - norm) * 240; 
            return `hsl(${hue}, 100%, 50%)`;
        }

        if (style === 'elevation') {
            if (statsMinMax.maxEle === statsMinMax.minEle) return 'hsl(120, 100%, 50%)';
            let norm = (segment.ele - statsMinMax.minEle) / (statsMinMax.maxEle - statsMinMax.minEle);
            norm = Math.max(0, Math.min(1, norm));
            
            // HSL: 120 (Grön=Låg) -> 60 (Gul) -> 0 (Röd=Hög)
            const hue = (1 - norm) * 120;
            return `hsl(${hue}, 100%, 50%)`;
        }
    }

    function drawPreview() {
        if (pathSegments.length === 0) return;
        
        const size = 1080;
        previewCanvas.width = size;
        previewCanvas.height = size;
        ctx.clearRect(0, 0, size, size);

        const pad = parseFloat(padSlider.value) / 100;
        
        let lats = rawPoints.map(p => p.lat), lons = rawPoints.map(p => p.lon);
        let minLat = Math.min(...lats), maxLat = Math.max(...lats);
        let minLon = Math.min(...lons), maxLon = Math.max(...lons);

        const mapX = lon => size * pad + (lon - minLon) / (maxLon - minLon) * size * (1 - 2 * pad);
        const mapY = lat => size * (1 - pad) - (lat - minLat) / (maxLat - minLat) * size * (1 - 2 * pad);

        // --- RITA RUTTEN MED OLIKA FÄRGER ---
        ctx.lineWidth = styleSelect.value === 'solid' ? 12 : 8; // Lite tunnare linje om det är en gradient för att se färgerna bättre
        ctx.lineJoin = "round";
        ctx.lineCap = "round";
        
        for (let seg of pathSegments) {
            ctx.strokeStyle = getSegmentColor(seg);
            ctx.beginPath();
            ctx.moveTo(mapX(seg.p1.lon), mapY(seg.p1.lat));
            ctx.lineTo(mapX(seg.p2.lon), mapY(seg.p2.lat));
            ctx.stroke();
        }

        // Rita texten (Samma som förut)
        const activeStats = [];
        if (document.getElementById('showDist').checked) activeStats.push({val: processedStats.distStr, label: "DISTANS"});
        if (document.getElementById('showTime').checked) activeStats.push({val: processedStats.timeStr, label: "TID"});
        if (document.getElementById('showPace').checked) activeStats.push({val: processedStats.paceStr, label: "TEMPO"});
        if (document.getElementById('showHR').checked) activeStats.push({val: processedStats.hrStr, label: "SNITTPULS"});
        if (document.getElementById('showEle').checked) activeStats.push({val: processedStats.eleStr, label: "STIGNING"});
    
        if (activeStats.length > 0) {
            const spacing = size / (activeStats.length + 1);
            activeStats.forEach((stat, i) => {
                const x = spacing * (i + 1);
                ctx.textAlign = "center";
                ctx.fillStyle = "white";
                ctx.font = "bold 45px Arial";
                ctx.fillText(stat.val, x, size - 120);
                ctx.font = "25px Arial";
                ctx.fillStyle = "#aaa";
                ctx.fillText(stat.label, x, size - 80);
            });
        }
    }

    function updateMap() {
        // Rensa kartan från gamla linjer
        map.eachLayer(layer => {
            if (layer instanceof L.Polyline && !(layer instanceof L.TileLayer)) {
                map.removeLayer(layer);
            }
        });

        // Eftersom en linje nu kan ha hundratals färger, måste vi skapa en polyline för varje segment
        const mapLines = [];
        for (let seg of pathSegments) {
            const color = getSegmentColor(seg);
            mapLines.push( L.polyline([[seg.p1.lat, seg.p1.lon], [seg.p2.lat, seg.p2.lon]], {
                color: color,
                weight: styleSelect.value === 'solid' ? 4 : 5 // Lite tjockare om det är färgkodat
            }) );
        }
        
        // Lägg till alla linjer i en grupp på kartan
        if (mapLines.length > 0) {
            const group = L.featureGroup(mapLines).addTo(map);
            map.fitBounds(group.getBounds(), {padding: [20, 20]});
        }
    }

    downloadBtn.addEventListener('click', () => {
        const link = document.createElement('a');
        link.download = `garmin-overlay-${new Date().getTime()}.png`;
        link.href = previewCanvas.toDataURL("image/png");
        link.click();
    });
</script>

</body>
</html>
